name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/remote-cli-relay

jobs:
  build-agent:
    name: Build agent binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build agent (${{ matrix.suffix }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/remote-cli-agent-${{ matrix.suffix }} ./cmd/agent

      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.suffix }}
          path: dist/remote-cli-agent-${{ matrix.suffix }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-agent]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum remote-cli-agent-* > checksums.txt
          cat checksums.txt

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.relay
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/remote-cli-agent-*
            dist/checksums.txt
          generate_release_notes: true
          body: |
            ## Installation

            **Relay** (Docker):
            ```bash
            # Copy .env.example to .env and fill in RELAY_JWT_SECRET, RELAY_ADMIN_PASSWORD, RELAY_URL
            docker compose up -d
            ```

            **Agent** — download the binary for your platform below, then:
            ```bash
            chmod +x remote-cli-agent-*
            mv remote-cli-agent-* /usr/local/bin/remote-cli
            remote-cli pair --relay https://your-relay-url
            remote-cli run
            ```

            See [README](https://github.com/${{ github.repository }}#readme) for full quickstart.
