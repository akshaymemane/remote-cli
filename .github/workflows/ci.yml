name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install CGO deps
        run: sudo apt-get install -y gcc

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Build relay
        run: CGO_ENABLED=1 go build -o /dev/null ./cmd/relay

      - name: Build agent
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/agent

  pwa:
    name: PWA build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - run: npm ci
      - run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.relay
          push: false
          tags: remote-cli-relay:ci
